<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AdventQuiz — live Bible trivia for Adventist groups.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AdventQuiz">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AdventQuiz</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #F3E7D3;
    }
    .boot {
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, "Times New Roman", serif;
      color: #2F5D50;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div class="boot" id="boot">Loading AdventQuiz…</div>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    _flutter.loader.load({
      config: {
        useLocalCanvasKit: true
      },
      onEntrypointLoaded: async function(engineInitializer) {
        const appRunner = await engineInitializer.initializeEngine({
          useLocalCanvasKit: true
        });
        const boot = document.getElementById('boot');
        if (boot) boot.remove();
        await appRunner.runApp();
      }
    });
  </script>
</body>
</html>
